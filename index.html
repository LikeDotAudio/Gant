<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gan't Do It!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Added React, ReactDOM, and ReactFlow dependencies for Mind Map View -->
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.10.3/dist/style.css" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.3/dist/umd/index.js"></script>

    <script>
        window.app = {
            _loading: true,
            _notify: () => { 
                const status = document.getElementById('status-text');
                if (status) status.innerText = "Application is still loading... please wait.";
            },
            openDir() { this._notify(); },
            newFile() { this._notify(); },
            saveFile() { this._notify(); },
            saveFileAs() { this._notify(); },
            importCSV() { this._notify(); },
            exportCSV() { this._notify(); },
            setView() { this._notify(); },
            toggleJsonView() { this._notify(); },
            toggleCol() { this._notify(); },
            zoom() { this._notify(); },
            foldToLevel() { this._notify(); }
        };
    </script>
</head>
<body>
    <div id="workspace" class="hide-start hide-end">
        <div class="header">
            <div class="menu-bar">
                <div class="menu-group">
                    <div class="menu-label">FILE</div>
                    <div class="menu-content">
                        <button onclick="window.app.openDir()">📂 Open File</button>
                        <hr style="border:none; border-top:1px solid #444; margin:5px 0;">
                        <button onclick="window.app.newFile()">📄 New File</button>
                        <hr style="border:none; border-top:1px solid #444; margin:5px 0;">
                        <button onclick="window.app.saveFile()">💾 Save</button>
                        <button onclick="window.app.saveFileAs()">💾 Save As...</button>
                        <hr style="border:none; border-top:1px solid #444; margin:5px 0;">
                        <button onclick="window.app.importCSV()">📥 Import from CSV</button>
                        <button onclick="window.app.exportCSV()">📤 Export to CSV</button>
                    </div>
                </div>
                <div class="menu-group">
                    <div class="menu-label">EDIT</div>
                    <div class="menu-content">
                        <button onclick="window.app.undo()">↩️ Undo (Ctrl+Z)</button>
                        <button onclick="window.app.clearUndo()">🧹 Clear Undo History</button>
                        <hr style="border:none; border-top:1px solid #444; margin:5px 0;">
                        <button onclick="window.app.addAbove()">➕ Add Task Above</button>
                        <button onclick="window.app.addBelow()">➕ Add Task Below (Ctrl+Enter)</button>
                        <button onclick="window.app.confirmDeleteSelected()" style="color: #ff6b6b;">🗑️ Delete Selected (Del)</button>
                    </div>
                </div>
                <div class="menu-group">
                    <div class="menu-label">VIEW</div>
                    <div class="menu-content">
                        <button onclick="window.app.setView('visual')">📊 View as WBS</button>
                        <button onclick="window.app.setView('spreadsheet')">📋 View as Spreadsheet</button>
                        <button onclick="window.app.setView('printer')">🖨️ Printer Friendly</button>
                        <button onclick="window.app.setView('json')">📄 View as JSON</button>
                        <!-- Added Mind Map Button -->
                        <button onclick="window.app.setView('mindmap')">🧠 View as Mind Map</button>
                    </div>
                </div>
            </div>
            <h2 id="active-filename">Gan't Do It!</h2>
            <div id="version-display" style="font-size: 10px; color: #666;">Version: 20260503.1206</div>

            <div class="zoom-controls">
                <span>Zoom:</span>
                <button onclick="window.app.zoom(-10)">➖</button>
                <button onclick="window.app.zoomFit()" title="Zoom to Fit All">ALL</button>
                <button onclick="window.app.zoom(10)">➕</button>
            </div>
        </div>

        <div class="col-toggles">
            <span>Show / Fold to:</span>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('root', this.checked)">
                <button class="fold-btn" onclick="window.app.foldToLevel(0)">Root</button>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('parent', this.checked)">
                <button class="fold-btn" onclick="window.app.foldToLevel(1)">Parent</button>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('child', this.checked)">
                <button class="fold-btn" onclick="window.app.foldToLevel(2)">Child</button>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('sibling', this.checked)">
                <button class="fold-btn" onclick="window.app.foldToLevel(3)">Siblings</button>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('color', this.checked)">
                <span>Color</span>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('dep', this.checked)">
                <span>Dependency</span>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('prog', this.checked)">
                <span>Progress</span>
            </div>
            <span style="border-left: 1px solid #444; height: 12px; margin: 0 5px;"></span>
            <div class="toggle-item">
                <input type="checkbox" onchange="window.app.toggleCol('start', this.checked)">
                <span>Start</span>
            </div>
            <div class="toggle-item">
                <input type="checkbox" onchange="window.app.toggleCol('end', this.checked)">
                <span>Stop</span>
            </div>
            <div class="toggle-item">
                <input type="checkbox" checked onchange="window.app.toggleCol('dur', this.checked)">
                <span>Days</span>
            </div>
            <span style="border-left: 1px solid #444; height: 12px; margin: 0 5px;"></span>
        </div>

        <div id="editor-container">
            <div id="view-visual" class="view-content active"><div id="gantt-container"><div id="gantt-chart"></div></div></div>
            <div id="view-spreadsheet" class="view-content"></div>
            <div id="view-printer" class="view-content"></div>
            <div id="view-json" class="view-content"><textarea id="json-editor"></textarea></div>
            <!-- Added container for the Mind Map View -->
            <div id="view-mindmap" class="view-content" style="flex-grow: 1;"></div>
        </div>

        <div id="status">
            <div id="status-text">System Ready.</div>
            <div id="confirm-del" class="confirm-group">
                <span id="del-prompt">Really delete?</span>
                <button id="del-yes" style="background:#7a2d2d">Yes</button>
                <button id="del-no">No</button>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div class="overlay-content">
            <h3 id="overlay-title">Edit Task</h3>
            <div id="overlay-fields" style="display:flex; flex-direction: column; gap:10px;">
                <label>Name: <input type="text" id="overlay-input"></label>
                <div style="display:flex; gap:10px;">
                    <label style="flex:1">Start: <input type="date" id="overlay-start" style="width:100%"></label>
                    <label style="flex:1">Stop: <input type="date" id="overlay-end" style="width:100%"></label>
                </div>
                <div style="display:flex; gap:10px;">
                    <label style="flex:1">ID: <input type="text" id="overlay-id" style="width:100%"></label>
                </div>
                <div id="progress-container" style="display:flex; align-items:center; gap:10px;">
                    Progress: <input type="range" id="overlay-progress" min="0" max="100" style="flex-grow:1; cursor:pointer"> <span id="progress-val">0%</span>
                </div>
                <div>Color Palette:</div>
                <div id="palette-grid"></div>
            </div>
            <div style="display:flex; gap:10px; justify-content: flex-end;">
                <button id="overlay-cancel">Cancel</button>
                <button id="overlay-ok" style="background:var(--accent-color)">OK</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
